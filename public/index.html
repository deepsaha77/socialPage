<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SocialBook</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="left">
        <h1>FaceBook</h1>
        <p>Connect with friends, share moments, and discover what's happening around you.</p>
    </div>

    <div class="card">

        <h2>Welcome Back</h2>
        <p class="subtitle">Sign in to continue</p>

        <form action="/login" method="POST">

            <input
                type="email"
                name="email"
                placeholder="Email"
                required
            >

            <input
                type="password"
                name="password"
                placeholder="Password"
                required
            >

            <button type="submit">
                Login
            </button>

        </form>

        <a href="#" class="forgot">Forgot Password?</a>

        <hr>

        <button class="create">
            Create New Account
        </button>

    </div>

</div>

</body>
</html>
